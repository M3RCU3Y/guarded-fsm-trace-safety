name: checks

on:
  push:
  pull_request:

jobs:
  artifact:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run reproduction
        run: python artifact/run_all.py

      - name: Validate generated artifact
        run: python artifact/validate_artifact.py

      - name: Run unit tests
        run: python -m unittest discover -s artifact/tests -p "test_*.py"

      - name: Rebuild README assets
        run: python scripts/make_readme_assets.py

      - name: Check release folder
        run: python scripts/check_release.py
